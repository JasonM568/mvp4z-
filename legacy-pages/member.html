<!doctype html>
<html lang="zh-Hant"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>巽風 AI 會員中心</title><link rel="stylesheet" href="css/member.css">
<script src="js/member-config.js"></script><script src="js/member-auth.js"></script>
</head><body onload="loadMember()">
<header class="topbar"><div class="wrap nav">
  <a class="brand" href="index.html"><div class="mark">巽</div><div><strong>巽風堪輿</strong><small>XUNFENG FIELD STRATEGY</small></div></a>
  <nav class="nav-actions">
    <a class="btn" href="member-pricing.html">會員方案</a>
    <a class="btn" href="login.html">登入</a>
    <a class="btn primary" href="member-ai.html">AI 會員版</a>
  </nav>
</div></header>
<section class="hero"><div class="wrap">
  <div class="kicker">MEMBER CENTER</div>
  <h1>會員中心<span class="accent">管理你的 AI 服務權限</span></h1>
</div></section>
<section class="section"><div class="wrap member-shell">
  <aside class="panel member-side">
    <h2 id="memberName">讀取中</h2>
    <div class="member-meta">
      <div>方案：<strong id="memberPlan"></strong></div>
      <div>狀態：<strong id="memberStatus"></strong></div>
      <div>剩餘次數：<strong id="memberCredits"></strong></div>
      <div>到期日：<strong id="memberExpires"></strong></div>
    </div>
    <a id="enterAi" class="btn primary block" href="member-ai.html" style="display:none">進入 AI 會員版</a>
    <a id="buyPlanCta" class="btn primary block" href="member-pricing.html" style="display:none">立即購買方案</a>
    <button class="btn block" onclick="logout()">登出</button>
  </aside>
  <main class="panel">
    <div id="paymentBanner" class="status" style="display:none;margin-bottom:1.5rem"></div>
    <div id="activePanel" style="display:none">
      <h2>方案已啟用</h2>
      <p>你的會員方案已開通，可直接使用風羿老師 AI 會員版進行八字、風水、命理問答。</p>
      <p>需要升級方案或加購點數，請至<a href="member-pricing.html">會員方案頁</a>。</p>
    </div>
    <div id="pendingPanel">
      <h2>啟用會員方案</h2>
      <p>選擇方案 → 綠界線上付款 → 系統自動寫入點數與到期日，立即開始使用 AI 會員版。</p>
      <p style="margin:1rem 0">
        <a class="btn primary" href="member-pricing.html">前往會員方案頁</a>
      </p>
      <hr style="margin:2rem 0;opacity:0.2">
      <p style="font-size:0.9rem;opacity:0.75;cursor:pointer" onclick="toggleRedeem()">
        ▸ 我有啟用碼（admin 或活動序號）
      </p>
      <div id="redeemPanel" style="display:none">
        <div class="form">
          <label>啟用碼<input id="code" placeholder="例如 XF-ABCD-1234"></label>
          <button class="btn" onclick="redeemCode()">啟用會員</button>
          <div id="redeemStatus" class="status"></div>
        </div>
      </div>
    </div>
  </main>
</div></section>
</body></html>
